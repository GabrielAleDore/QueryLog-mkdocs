site_name: QueryLog
site_url: https://querylog.org

# Configuração do repositório
repo_url: https://github.com/GabrielAleDore/QueryLog-mkdocs
repo_name: QueryLog-mkdocs
edit_uri: edit/main/docs

theme:
  name: material
  custom_dir: overrides       # Habilita templates customizados (home.html)

  icon:
    repo: fontawesome/brands/gitlab
    edit: material/pencil
    view: material/eye

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.instant          # Carregamento instantâneo
    - navigation.instant.prefetch # Pré-busca instantânea
    - navigation.instant.progress # Indicador de progresso
    - navigation.instant.preview  # Pré-visualizações globais
    - navigation.tracking         # Âncora para navegação
    - navigation.tabs             # Guias de navegação
    - navigation.tabs.sticky      # Abas de navegação fixas
    - navigation.sections         # Seções de navegação
    - navigation.path             # Caminho das pastas
    - navigation.indexes          # Páginas de índice
    - navigation.top              # Voltar ao topo
    - toc.follow                  # TOC acompanha o scroll
    - search.suggest              # Sugestões de pesquisa
    - search.highlight            # Destaca as pesquisas
    - search.share                # Compartilhar pesquisas
    - header.autohide             # Oculta o cabeçalho automaticamente
    - navigation.footer           # Botão próximo e anterior
    - content.action.edit         # Permite editar os arquivos
    - content.code.copy           # Permite copiar o código
    - content.code.annotate       # Criar comentários no código
    - content.tabs.link           # Guias de conteúdos vinculados

  palette:
  # Automatic mode
  - media: "(prefers-color-scheme)"
    toggle:
      icon: material/brightness-auto
      name: Switch to light mode

  # Light mode
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: indigo
    accent: blue
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode

  # Dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: indigo
    accent: blue
    toggle:
      icon: material/brightness-4
      name: Switch to system preference

# Stylesheet customizado
extra_css:
  - stylesheets/extra.css

# Configuração de privacidade / consentimento
extra:
  consent:
    title: Consentimento de Cookies
    description: >-
      Usamos cookies para reconhecer suas visitas repetidas e preferências, bem como
      para medir a eficácia de nossa documentação. Com seu consentimento, você nos
      ajuda a melhorar a experiência de todos.
    cookies:
      analytics: Google Analytics
    actions:
      - accept
      - manage
      - reject

  # Algolia DocSearch — preencha com as credenciais após solicitar acesso em docsearch.algolia.com
  # analytics:
  #   provider: algolia
  #   property: ALGOLIA_APP_ID
  #   api_key: ALGOLIA_SEARCH_ONLY_KEY
  #   index_name: querylog

# Extensões Markdown
markdown_extensions:
  - attr_list     # Lista de atributos
  - admonition    # Caixas de aviso (note, tip, warning…)
  - abbr          # Abreviações
  - def_list      # Listas de definições
  - footnotes     # Notas de rodapé
  - md_in_html    # Permite personalizar com HTML
  - tables        # Tabelas

  # Emojis e ícones inline  :material-database:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  # Personalização do bloco de código
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

  # Guias de conteúdo / code tabs
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

  # Listas de tarefas
  - pymdownx.tasklist:
      custom_checkbox: true

  # Pré-visualizações automáticas (link hover)
  - material.extensions.preview:
      configurations:
       - targets:
          include:
            - index.md

# Plugins
plugins:
  - search

  # Categorização por tags  (#tag nas páginas)
  - tags

  # Responsável pelo versionamento (datas de criação/edição)
  - git-revision-date-localized:
      enable_creation_date: true
      enabled: true
      type: date

  # Avatares de contribuidores
  # O token é lido de variável de ambiente — NÃO coloque tokens em texto plano aqui!
  - git-committers:
      repository: GabrielAleDore/QueryLog-mkdocs
      branch: main
      token: !ENV MKDOCS_GIT_COMMITTERS_APIKEY

# Estrutura de navegação
nav:
  - Home: index.md
  - Scripts:
    - scripts/index-scripts.md
    - Documentos:
      - scripts/boas-praticas-sql.md
  - Relatórios:
    - relatorios/index-relatorios.md
  - Banco de Dados:
    - banco-de-dados/index-banco-de-dados.md